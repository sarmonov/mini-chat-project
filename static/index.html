<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-time Chat</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273449;
      --accent: #6366f1;
      --accent-2: #818cf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --me: #4f46e5;
      --other: #334155;
      --danger: #ef4444;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---------- Login ---------- */
    #login {
      background: var(--panel);
      padding: 32px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    #login h1 { margin: 0 0 6px; font-size: 22px; }
    #login p { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; }
    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: var(--panel-2);
      color: var(--text);
      font-size: 14px;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    button:hover { background: var(--accent-2); }
    #joinBtn { width: 100%; padding: 12px; margin-top: 20px; font-size: 15px; }
    .error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 16px; }

    /* ---------- Chat ---------- */
    #chat { display: none; width: 100%; height: 100vh; }
    .layout { display: grid; grid-template-columns: 220px 1fr; height: 100vh; }
    .sidebar {
      background: var(--panel);
      padding: 18px;
      overflow-y: auto;
      border-right: 1px solid #0b1220;
    }
    .sidebar h3 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin: 18px 0 8px; }
    .room { padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 4px; }
    .room:hover { background: var(--panel-2); }
    .room.active { background: var(--accent); }
    .room::before { content: "# "; color: var(--muted); }
    .room.active::before { color: #c7d2fe; }
    .user-item { padding: 6px 10px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }

    .main { display: flex; flex-direction: column; height: 100vh; }
    .header {
      padding: 16px 20px;
      background: var(--panel);
      border-bottom: 1px solid #0b1220;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header .room-name { font-weight: 700; font-size: 16px; }
    .header .me { color: var(--muted); font-size: 13px; }

    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 70%; padding: 9px 13px; border-radius: 14px; background: var(--other); }
    .msg.me { align-self: flex-end; background: var(--me); }
    .msg .meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; display: flex; gap: 8px; }
    .msg.me .meta { color: #c7d2fe; }
    .msg .text { font-size: 14px; word-wrap: break-word; }
    .msg .receipt { font-size: 11px; margin-left: 6px; }
    .notif { align-self: center; font-size: 12px; color: var(--muted); font-style: italic; }

    .typing { height: 20px; padding: 0 20px; font-size: 13px; color: var(--accent-2); font-style: italic; }

    .composer { display: flex; gap: 10px; padding: 16px 20px; background: var(--panel); border-top: 1px solid #0b1220; }
    #msgInput { flex: 1; }
    #sendBtn { padding: 0 22px; }
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--danger); color: white; padding: 10px 18px; border-radius: 10px;
      font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <h1>💬 Real-time Chat</h1>
    <p>Username kiriting va xonaga qo'shiling</p>
    <label for="usernameInput">Username</label>
    <input id="usernameInput" placeholder="masalan: ali" autocomplete="off" maxlength="20" />
    <label for="roomSelect">Xona</label>
    <select id="roomSelect"></select>
    <button id="joinBtn">Kirish</button>
    <div class="error" id="loginError"></div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="layout">
      <div class="sidebar">
        <h3>Xonalar</h3>
        <div id="roomList"></div>
        <h3>Online (<span id="onlineCount">0</span>)</h3>
        <div id="userList"></div>
      </div>
      <div class="main">
        <div class="header">
          <span class="room-name" id="roomName"># general</span>
          <span class="me" id="meLabel"></span>
        </div>
        <div id="messages"></div>
        <div class="typing" id="typingIndicator"></div>
        <div class="composer">
          <input id="msgInput" placeholder="Xabar yozing..." autocomplete="off" />
          <button id="sendBtn">Yuborish</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ROOMS_FALLBACK = ["general", "random", "tech"];
    let ws = null;
    let username = "";
    let room = "general";
    let lastSeenId = 0;            // o'qiganimni belgilash uchun eng katta message_id
    let readTimer = null;
    let myMessages = {};           // message_id -> DOM element (read receipt yangilash uchun)

    const $ = (id) => document.getElementById(id);

    // ---------- Init: xonalarni yuklash ----------
    async function loadRooms() {
      let rooms = ROOMS_FALLBACK;
      try {
        const res = await fetch("/rooms");
        rooms = (await res.json()).rooms;
      } catch (_) {}
      const sel = $("roomSelect");
      const list = $("roomList");
      sel.innerHTML = "";
      list.innerHTML = "";
      rooms.forEach((r) => {
        const opt = document.createElement("option");
        opt.value = r; opt.textContent = "# " + r;
        sel.appendChild(opt);

        const div = document.createElement("div");
        div.className = "room";
        div.textContent = r;
        div.dataset.room = r;
        div.onclick = () => switchRoom(r);
        list.appendChild(div);
      });
    }

    // ---------- Login ----------
    $("joinBtn").onclick = () => {
      const u = $("usernameInput").value.trim();
      if (!u) { $("loginError").textContent = "Username bo'sh bo'lmasin"; return; }
      username = u;
      room = $("roomSelect").value;
      connect();
    };
    $("usernameInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("joinBtn").click(); });

    // ---------- WebSocket ulanish ----------
    function connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${proto}://${location.host}/ws/${room}/${encodeURIComponent(username)}`);

      ws.onmessage = (e) => handleEvent(JSON.parse(e.data));

      ws.onclose = (e) => {
        if (e.code === 4001 || e.code === 4002) {
          // login xatosi (band username / bo'sh)
          showLogin();
        } else if ($("chat").style.display === "block") {
          showToast("Ulanish uzildi");
        }
      };

      ws.onopen = () => {
        showChat();
        startHeartbeat();
      };
    }

    function showChat() {
      $("login").style.display = "none";
      $("chat").style.display = "block";
      $("meLabel").textContent = "Siz: " + username;
      $("roomName").textContent = "# " + room;
      $("messages").innerHTML = "";
      myMessages = {};
      lastSeenId = 0;
      // active xona belgilash
      document.querySelectorAll(".room").forEach((el) => {
        el.classList.toggle("active", el.dataset.room === room);
      });
      $("msgInput").focus();
    }

    function showLogin() {
      $("chat").style.display = "none";
      $("login").style.display = "block";
      $("loginError").textContent = "";
    }

    // ---------- Xona almashtirish ----------
    function switchRoom(newRoom) {
      if (newRoom === room) return;
      room = newRoom;
      if (ws) ws.close(1000);
      connect();
    }

    // ---------- Eventlarni qayta ishlash ----------
    function handleEvent(data) {
      switch (data.type) {
        case "history":
          data.messages.forEach(renderMessage);
          scrollDown();
          sendReadReceipt();
          break;
        case "message":
          renderMessage(data);
          scrollDown();
          sendReadReceipt();
          break;
        case "online_users":
          renderOnline(data.users);
          break;
        case "notification":
          renderNotification(data);
          break;
        case "typing":
          showTyping(data.username);
          break;
        case "read":
          handleReadReceipt(data);
          break;
        case "error":
          if ($("chat").style.display === "block") showToast(data.message);
          else $("loginError").textContent = data.message;
          break;
      }
    }

    function renderMessage(m) {
      const isMe = m.username === username;
      const el = document.createElement("div");
      el.className = "msg" + (isMe ? " me" : "");
      const time = new Date(m.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `<span>${escapeHtml(m.username)}</span><span>${time}</span>`;

      const text = document.createElement("div");
      text.className = "text";
      text.textContent = m.message;

      el.appendChild(meta);
      el.appendChild(text);

      if (isMe) {
        const r = document.createElement("span");
        r.className = "receipt";
        r.textContent = "✓";              // yuborildi
        r.title = "Yuborildi";
        meta.appendChild(r);
        myMessages[m.message_id] = r;
      }

      $("messages").appendChild(el);
      if (m.message_id && m.message_id > lastSeenId) lastSeenId = m.message_id;
    }

    function renderNotification(n) {
      const el = document.createElement("div");
      el.className = "notif";
      const verb = n.event === "join" ? "qo'shildi ✅" : "chiqdi 👋";
      el.textContent = `${n.username} ${verb}`;
      $("messages").appendChild(el);
      scrollDown();
    }

    function renderOnline(users) {
      $("onlineCount").textContent = users.length;
      const list = $("userList");
      list.innerHTML = "";
      users.forEach((u) => {
        const div = document.createElement("div");
        div.className = "user-item";
        div.innerHTML = `<span class="dot"></span>${escapeHtml(u)}${u === username ? " (siz)" : ""}`;
        list.appendChild(div);
      });
    }

    // ---------- Typing indicator ----------
    let typingTimeout = null;
    function showTyping(who) {
      if (who === username) return;
      $("typingIndicator").textContent = `${who} yozmoqda...`;
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { $("typingIndicator").textContent = ""; }, 3000);
    }

    let lastTypingSent = 0;
    $("msgInput").addEventListener("input", () => {
      const now = Date.now();
      if (now - lastTypingSent > 1500 && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: "typing" }));
        lastTypingSent = now;
      }
    });

    // ---------- Read receipts ----------
    function sendReadReceipt() {
      if (!ws || ws.readyState !== 1 || lastSeenId === 0) return;
      clearTimeout(readTimer);
      readTimer = setTimeout(() => {
        ws.send(JSON.stringify({ type: "read", message_id: lastSeenId }));
      }, 300);
    }

    function handleReadReceipt(data) {
      if (data.username === username) return;  // o'zimning o'qishim emas
      // boshqa user data.message_id gacha o'qidi -> shu IDgacha bo'lgan mening xabarlarim ✓✓
      Object.keys(myMessages).forEach((id) => {
        if (Number(id) <= data.message_id) {
          const r = myMessages[id];
          r.textContent = "✓✓";
          r.style.color = "#34d399";
          r.title = "O'qildi";
        }
      });
    }

    // ---------- Xabar yuborish ----------
    function send() {
      const text = $("msgInput").value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: "message", message: text }));
      $("msgInput").value = "";
    }
    $("sendBtn").onclick = send;
    $("msgInput").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

    // ---------- Heartbeat ----------
    function startHeartbeat() {
      setInterval(() => {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "heartbeat" }));
      }, 15000);
    }

    // ---------- Yordamchilar ----------
    function scrollDown() { const m = $("messages"); m.scrollTop = m.scrollHeight; }
    function showToast(text) {
      const t = $("toast");
      t.textContent = text;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    loadRooms();
  </script>
</body>
</html>
