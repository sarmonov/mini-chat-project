<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Telegram</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ============ AUTH EKRANI ============ -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">💬</div>
      <h1 id="auth-title">Mini Telegram</h1>
      <p class="auth-subtitle" id="auth-subtitle">Hisobingizga kiring</p>

      <form id="auth-form" class="auth-form" autocomplete="off">
        <div class="field" id="name-field" style="display:none">
          <input id="display_name" type="text" placeholder="Ismingiz" maxlength="64" />
        </div>
        <div class="field">
          <input id="username" type="text" placeholder="Username" maxlength="32" required />
        </div>
        <div class="field">
          <input id="password" type="password" placeholder="Parol" minlength="6" required />
        </div>
        <div class="auth-error" id="auth-error"></div>
        <button type="submit" class="btn-primary" id="auth-submit">Kirish</button>
      </form>

      <p class="auth-switch">
        <span id="switch-text">Hisobingiz yo'qmi?</span>
        <a href="#" id="switch-link">Ro'yxatdan o'tish</a>
      </p>
    </div>
  </div>

  <!-- ============ ASOSIY ILOVA ============ -->
  <div id="app" class="app hidden">
    <!-- Chap panel -->
    <aside class="sidebar">
      <header class="sidebar-header">
        <div class="me" id="me-box">
          <div class="avatar" id="me-avatar"></div>
          <div class="me-info">
            <div class="me-name" id="me-name"></div>
            <div class="me-username" id="me-username"></div>
          </div>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn" id="new-group-btn" title="Yangi guruh">👥</button>
          <button class="icon-btn" id="new-chat-btn" title="Yangi suhbat">✎</button>
          <button class="icon-btn" id="logout-btn" title="Chiqish">⎋</button>
        </div>
      </header>

      <div class="search-box">
        <input id="search-input" type="text" placeholder="Qidirish: foydalanuvchi yoki suhbat" />
      </div>

      <div class="chat-list" id="chat-list"></div>
      <div class="search-results hidden" id="search-results"></div>
    </aside>

    <!-- O'ng panel -->
    <main class="chat-panel">
      <div class="empty-state" id="empty-state">
        <div class="empty-emoji">✈️</div>
        <p>Suhbat tanlang yoki yangisini boshlang</p>
      </div>

      <div class="conversation hidden" id="conversation">
        <header class="conv-header">
          <button class="icon-btn back-btn" id="back-btn" title="Orqaga">‹</button>
          <div class="conv-avatar" id="conv-avatar"></div>
          <div class="conv-title-box">
            <div class="conv-title" id="conv-title"></div>
            <div class="conv-status" id="conv-status"></div>
          </div>
          <button class="icon-btn" id="chat-info-btn" title="Ma'lumot">ⓘ</button>
        </header>

        <div class="messages" id="messages"></div>

        <div class="typing-bar" id="typing-bar"></div>

        <footer class="composer">
          <label class="icon-btn attach-btn" title="Fayl biriktirish">
            📎<input type="file" id="file-input" hidden />
          </label>
          <div class="composer-main">
            <div class="attach-preview hidden" id="attach-preview"></div>
            <textarea id="msg-input" rows="1" placeholder="Xabar yozing..."></textarea>
          </div>
          <button class="send-btn" id="send-btn" title="Yuborish">➤</button>
        </footer>
      </div>
    </main>
  </div>

  <!-- ============ MODAL ============ -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
